<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrivacyHub: Reimagining YouTube's Data Consent Experience under DPDP Act, 2023</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <!-- Top Header Bar -->
    <header class="app-header">
        <div class="header-left">
            <span class="yt-logo-icon">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="#FF0000">
                    <path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.517 3.545 12 3.545 12 3.545s-7.517 0-9.388.508a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.871.508 9.388.508 9.388.508s7.517 0 9.388-.508a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
            </span>
            <h1 class="header-title">YouTube <span class="title-sub text-red">PrivacyHub</span></h1>
            <span class="badge">India's DPDP Act, 2023 Compliance</span>
        </div>
        <div class="header-right">
            <!-- Mode Toggle Switch (Presentation/Prototype Split Toggle on Mobile) -->
            <div class="view-toggles hide-on-desktop">
                <button id="btn-show-presentation" class="view-toggle-btn active">Presentation</button>
                <button id="btn-show-prototype" class="view-toggle-btn">Prototype</button>
            </div>
            <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Light/Dark Theme">
                <!-- Sun/Moon Icon will change dynamically -->
                <svg id="theme-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-12.37a.996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.02.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06a.996.996 0 0 0-1.41 0zm-12.37 12.37a.996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06a.996.996 0 0 0-1.41 0z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Workspace Container -->
    <main class="workspace-container">
        <!-- Presentation Slide Deck Section (Left Pane) -->
        <section id="presentation-panel" class="presentation-panel">
            <div class="slides-outer-wrapper">
                <div id="slides-container" class="slides-container">
                    <!-- Slides will go here -->
                </div>
            </div>

            <!-- Slides Navigation Footer Controls -->
            <footer class="slides-footer">
                <div class="nav-controls">
                    <button id="prev-slide-btn" class="nav-btn" aria-label="Previous Slide">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                        <span>Back</span>
                    </button>
                    <div class="slide-dots" id="slide-dots">
                        <!-- Dots populated by JS -->
                    </div>
                    <button id="next-slide-btn" class="nav-btn" aria-label="Next Slide">
                        <span>Next</span>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                    </button>
                </div>
                <div class="slide-progress-info">
                    <span id="current-slide-num">1</span> / <span id="total-slides-num">10</span>
                </div>
            </footer>
        </section>

        <!-- Interactive Prototype Simulator Section (Right Pane) -->
        <section id="prototype-panel" class="prototype-panel hidden-mobile">
            <div class="phone-simulator">
                <!-- Outer Bezel -->
                <div class="phone-bezel">
                    <!-- Phone Ear Piece and Camera Notch -->
                    <div class="phone-camera-notch"></div>
                    <div class="phone-earpiece"></div>
                    
                    <!-- Phone Internal Display -->
                    <div class="phone-screen">
                        <!-- Phone Status Bar -->
                        <div class="phone-status-bar">
                            <span class="status-time" id="status-time">09:41</span>
                            <div class="status-icons">
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.07 19.53 10.48 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                                <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M17 5H3a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm-1 11H4V8h12v8z"/></svg>
                            </div>
                        </div>

                        <!-- Phone Content Screens -->
                        <div id="phone-screens-container" class="phone-screens-container">
                            <!-- Screen 1: Welcome Screen -->
                            <!-- Screen 2: Data Usage Explanation -->
                            <!-- Screen 3: Granular Consent -->
                            <!-- Screen 4: Success / You're in Control -->
                            <!-- Screen 5: PrivacyHub Dashboard -->
                            <!-- Screen 6: Delete Data Confirmation -->
                        </div>

                        <!-- Phone Bottom Home Bar Indicator -->
                        <div class="phone-home-indicator"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
